name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore LocalDictation.sln

      - name: Build (Release)
        run: dotnet build LocalDictation.sln -c Release --no-restore

      # Unit + architecture tests only. The Evals project needs Whisper models and Ollama,
      # so it is intentionally excluded from CI (it is a console app, not a test project).
      - name: Test
        run: dotnet test LocalDictation.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'
          if-no-files-found: ignore
